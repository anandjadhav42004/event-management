openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Rika Events - Enterprise Event Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: events
    description: Event management
  - name: venues
    description: Venue management
  - name: vendors
    description: Vendor management
  - name: guests
    description: Guest management
  - name: bookings
    description: Booking management
  - name: quotations
    description: Quotation and pricing
  - name: tasks
    description: Task management
  - name: payments
    description: Payment management
  - name: inventory
    description: Inventory tracking
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard aggregates
  - name: rooms
    description: Room management
  - name: decor
    description: Decor catalog
  - name: anchors
    description: Anchor management
  - name: inquiries
    description: Inquiry / CRM management
  - name: activity
    description: Recent activity feed

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email/password
      requestBody:
