components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH ──────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, organizer, vendor, client, guest, finance, operations]
        phone:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ── USER ──────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        phone:
          type: string
        password:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string
        status:
          type: string
        role:
          type: string

    # ── INQUIRY ───────────────────────────────────────
    Inquiry:
      type: object
      required: [id, clientName, clientEmail, eventType, eventDate, status, createdAt]
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientEmail:
          type: string
        clientPhone:
          type: ["string", "null"]
        eventType:
          type: string
        eventDate:
          type: string
          format: date
        guestCount:
          type: ["integer", "null"]
        budget:
          type: ["number", "null"]
        status:
          type: string
          enum: [new, contacted, meeting_scheduled, quotation_sent, negotiation, approved, rejected, converted]
        notes:
          type: ["string", "null"]
        assignedTo:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    InquiryInput:
      type: object
      required: [clientName, clientEmail, eventType, eventDate]
      properties:
        clientName:
          type: string
        clientEmail:
          type: string
        clientPhone:
          type: string
        eventType:
          type: string
        eventDate:
          type: string
          format: date
        guestCount:
          type: integer
        budget:
          type: number
        notes:
          type: string
        assignedTo:
          type: integer

    InquiryUpdate:
      type: object
      properties:
        status:
          type: string
        notes:
          type: string
        assignedTo:
          type: integer
        budget:
          type: number

    # ── EVENT ─────────────────────────────────────────
    Event:
      type: object
      required: [id, title, type, status, startDate, endDate, guestCount, createdAt]
      properties:
        id:
          type: integer
